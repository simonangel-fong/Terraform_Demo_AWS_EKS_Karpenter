---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass # control how EC2 node is launched
metadata:
  name: default
spec:
  # Specify AMI
  amiSelectorTerms:
    - alias: bottlerocket@latest
  # match node_iam_role_name in karpenter
  role: eks-karpenter-demo
  # Specify subnet: match vpc subnet tag
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-karpenter-demo
  # Specify subnet: match security group
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-karpenter-demo
  # EC2 tag
  tags:
    karpenter.sh/discovery: eks-karpenter-demo
---
apiVersion: karpenter.sh/v1
kind: NodePool  # define what type of node to be launched
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "karpenter.k8s.aws/instance-category" 
          operator: In 
          values: ["t", "m"] # category letters only
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["on-demand"]
  limits:
    cpu: 1000
  disruption:
    consolidationPolicy: WhenEmpty  # delete nodes when they become empty.
    consolidateAfter: 30s